<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px; min-height: 400px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d1a; color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #1e1e3a;
    }
    .logo { font-size: 24px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header span { font-size: 11px; color: #888; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .stat-card {
      background: #161630; border-radius: 8px; padding: 10px 12px;
      border: 1px solid #1e1e3a;
    }
    .stat-value { font-size: 22px; font-weight: 800; color: #00c853; }
    .stat-label { font-size: 10px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    .source-list { margin-bottom: 14px; }
    .source-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #161630;
      font-size: 12px;
    }
    .source-name { color: #ccc; }
    .source-count { color: #00c853; font-weight: 600; }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 8px; transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: #00c853; color: #000; }
    .btn-primary:hover { background: #00e676; }
    .btn-secondary { background: #1e1e3a; color: #ccc; border: 1px solid #2a2a4a; }
    .btn-secondary:hover { background: #2a2a4a; }
    .btn-danger { background: #3a1e1e; color: #ff5252; border: 1px solid #4a2a2a; }
    .btn-danger:hover { background: #4a2a2a; }

    .actions { display: flex; gap: 8px; }
    .actions .btn { flex: 1; }

    .status {
      font-size: 11px; color: #666; text-align: center;
      margin-top: 8px; min-height: 16px;
    }
    .status.good { color: #00c853; }

    .model-preview {
      background: #161630; border-radius: 6px; padding: 8px 10px;
      margin-bottom: 12px; max-height: 120px; overflow-y: auto;
      font-size: 10px; color: #666;
    }
    .model-preview div { padding: 2px 0; border-bottom: 1px solid #1a1a36; }
    .model-preview b { color: #ccc; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🚗</span>
    <div>
      <h1>Kenya Auto Scraper</h1>
      <span id="activeSite">Browse a car site to collect</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">Total Listings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="siteCount">0</div>
      <div class="stat-label">This Session</div>
    </div>
  </div>

  <div class="source-list" id="sourceList"></div>

  <div class="model-preview" id="modelPreview">
    <div style="color:#555">Browse Cheki, Jiji, PigiaMe, or SBT Japan to start collecting.</div>
  </div>

  <button class="btn btn-primary" id="scrapeBtn">🔍 Scrape Current Page</button>

  <div class="actions">
    <button class="btn btn-secondary" id="exportJson">📦 Export JSON</button>
    <button class="btn btn-secondary" id="exportCsv">📊 Export CSV</button>
  </div>
  <button class="btn btn-danger" id="clearBtn">🗑 Clear All Data</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>

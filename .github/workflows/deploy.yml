name: Deploy API

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/listings/**"
      - "data/model_metrics.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        if: ${{ false }}  # Enable after connecting Railway
        uses: railwayapp/cli@latest
        with:
          args: up --service kenya-auto-pricing --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Render
        if: ${{ false }}  # Enable after connecting Render
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK }}"

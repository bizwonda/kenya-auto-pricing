name: Train Pricing Model

on:
  push:
    paths:
      - "data/listings/**"
  workflow_run:
    workflows: ["Scrape Vehicle Data"]
    types: [completed]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy xgboost scikit-learn category-encoders loguru tenacity

      - name: Train model
        run: python .github/scripts/train.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit trained model
        run: |
          git config user.name "Kenya Auto Pricing Bot"
          git config user.email "bot@kenyacarpricing.com"
          if [ -n "$(git status models/ data/model_metrics.json --porcelain 2>/dev/null)" ]; then
            git add models/ data/model_metrics.json
            git commit -m "🤖 Model retrained"
            git push
            echo "Model committed"
          else
            echo "Model unchanged"
          fi
